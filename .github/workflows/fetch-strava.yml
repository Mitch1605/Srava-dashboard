name: Fetch Strava Data

on:
  schedule:
    - cron: '0 */3 * * *'  # runs every 3 hours
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Strava activities
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          # Get fresh access token
          TOKEN_RESPONSE=$(curl -s -X POST https://www.strava.com/oauth/token \
            -d client_id=$STRAVA_CLIENT_ID \
            -d client_secret=$STRAVA_CLIENT_SECRET \
            -d refresh_token=$STRAVA_REFRESH_TOKEN \
            -d grant_type=refresh_token)

          ACCESS_TOKEN=$(echo $TOKEN_RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")

          echo "Access token retrieved"

          # ── 2026 training block (13 Apr 2026 onwards) ──
          # Fetch up to 100 activities after block start, paginated
          curl -s "https://www.strava.com/api/v3/athlete/activities?after=1776038400&per_page=100&page=1" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -o docs/activities_2026.json
          echo "Fetched 2026 activities"

          # ── 2024 comparison block (13 May 2024 – 15 Sep 2024) ──
          # Strava API uses after/before unix timestamps
          curl -s "https://www.strava.com/api/v3/athlete/activities?after=1715558400&before=1726444800&per_page=100&page=1" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -o docs/activities_2024.json
          echo "Fetched 2024 activities"

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/activities_2026.json docs/activities_2024.json
          git diff --staged --quiet || git commit -m "Update Strava activities $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
